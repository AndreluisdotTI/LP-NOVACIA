kind = "web"
previewPath = "/"
title = "NOVACIA — Link Dedicado"
version = "1.0.0"
id = "artifacts/novacia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25108

[services.development]
run = "pnpm --filter @workspace/novacia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novacia", "run", "build" ]
publicDir = "artifacts/novacia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25108"
BASE_PATH = "/"
